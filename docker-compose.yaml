services:
  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: app-backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${BACKEND_PORT}

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: app-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend