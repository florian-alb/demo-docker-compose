name: Build, Push and Deploy Docker Images

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    needs: test-backend

    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get short commit hash
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app-backend:${{ steps.vars.outputs.short_sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app-frontend:${{ steps.vars.outputs.short_sha }}

  deploy:
    runs-on: ubuntu-latest
    environment: dev
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy on Swarm manager
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SWARM_USER: ${{ secrets.SWARM_USER }}
          SWARM_MANAGER_HOST: ${{ secrets.SWARM_MANAGER_HOST }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_SECRET: ${{ secrets.DOCKERHUB_SECRET }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          scp -o StrictHostKeyChecking=no docker-stack.yml "$SWARM_USER@$SWARM_MANAGER_HOST:/tmp/docker-stack.yml"

          ssh -o StrictHostKeyChecking=no "$SWARM_USER@$SWARM_MANAGER_HOST" \
            "echo '$DOCKERHUB_SECRET' | docker login -u '$DOCKERHUB_USERNAME' --password-stdin && \
             DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' IMAGE_TAG='$IMAGE_TAG' \
             docker stack deploy --with-registry-auth -c /tmp/docker-stack.yml app"
